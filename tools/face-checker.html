<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>포켓몬 방향 체크</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
      font-size: 13px;
      padding: 20px;
    }

    h1 { margin-bottom: 6px; font-size: 18px; }

    .desc {
      color: #aaa;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .toolbar button {
      padding: 7px 14px;
      background: #2a2a5a;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .toolbar button:hover { background: #3a3a7a; }

    #count { color: #ffcc00; font-weight: bold; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
    }

    .card {
      background: #1e1e1e;
      border: 2px solid #333;
      border-radius: 6px;
      padding: 6px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.1s, background 0.1s;
      user-select: none;
    }

    .card:hover { border-color: #666; }

    .card.right {
      border-color: #e05050;
      background: #2a1010;
    }

    .card img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      display: block;
      margin: 0 auto 4px;
    }

    .card.right img {
      transform: scaleX(-1); /* 미리보기: 반전된 모습 */
    }

    .card .no {
      font-size: 10px;
      color: #888;
    }

    .card .name {
      font-size: 11px;
      color: #ccc;
      margin-top: 2px;
      min-height: 16px;
    }

    .card.right .name { color: #ff9999; }

    .output-wrap {
      margin-top: 24px;
    }

    .output-wrap h2 { margin-bottom: 8px; font-size: 15px; }

    #output {
      width: 100%;
      min-height: 80px;
      background: #0d0d0d;
      color: #7ec87e;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 12px;
      font-family: monospace;
      font-size: 13px;
      resize: vertical;
    }

    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #aaa;
    }
    .legend span { display: flex; align-items: center; gap: 6px; }
    .dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
    .dot.normal { background: #333; border: 2px solid #555; }
    .dot.right-dot { background: #2a1010; border: 2px solid #e05050; }
  </style>
</head>
<body>
  <h1>포켓몬 방향 체크 🔍</h1>
  <p class="desc">
    오른쪽을 바라보는 포켓몬을 클릭해서 선택하세요.<br>
    선택된 포켓몬은 빨간 테두리로 표시되고, 미리보기는 반전된 모습으로 보여줍니다.
  </p>

  <div class="legend">
    <span><div class="dot normal"></div> 왼쪽 바라봄 (기본)</span>
    <span><div class="dot right-dot"></div> 오른쪽 바라봄 (선택됨 → 반전 적용)</span>
  </div>

  <div class="toolbar">
    <button onclick="clearAll()">전체 해제</button>
    <button onclick="copyOutput()">결과 복사</button>
    <span>선택됨: <span id="count">0</span>마리</span>
  </div>

  <div class="grid" id="grid"></div>

  <div class="output-wrap">
    <h2>결과 (이 배열을 코드에 붙여넣기)</h2>
    <textarea id="output" readonly></textarea>
  </div>

  <script>
    const TOTAL = 151;
    const SPRITE = id =>
      `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
    const NAMES_URL = id =>
      `https://pokeapi.co/api/v2/pokemon-species/${id}`;

    const facingRight = new Set(
      JSON.parse(localStorage.getItem('facingRight') || '[]')
    );

    const grid = document.getElementById('grid');
    const output = document.getElementById('output');
    const countEl = document.getElementById('count');

    // 카드 생성
    for (let id = 1; id <= TOTAL; id++) {
      const card = document.createElement('div');
      card.className = 'card' + (facingRight.has(id) ? ' right' : '');
      card.dataset.id = id;
      card.innerHTML = `
        <img src="${SPRITE(id)}" alt="#${id}" loading="lazy" />
        <div class="no">No.${String(id).padStart(3,'0')}</div>
        <div class="name" id="name-${id}">#${id}</div>
      `;
      card.addEventListener('click', () => toggle(id, card));
      grid.appendChild(card);

      // 한국어 이름 비동기 로드
      fetchName(id);
    }

    updateOutput();

    async function fetchName(id) {
      try {
        const res = await fetch(NAMES_URL(id));
        const data = await res.json();
        const ko = data.names.find(n => n.language.name === 'ko')?.name;
        const el = document.getElementById(`name-${id}`);
        if (el && ko) el.textContent = ko;
      } catch {}
    }

    function toggle(id, card) {
      if (facingRight.has(id)) {
        facingRight.delete(id);
        card.classList.remove('right');
      } else {
        facingRight.add(id);
        card.classList.add('right');
      }
      save();
      updateOutput();
    }

    function clearAll() {
      facingRight.clear();
      document.querySelectorAll('.card.right').forEach(c => c.classList.remove('right'));
      save();
      updateOutput();
    }

    function save() {
      localStorage.setItem('facingRight', JSON.stringify([...facingRight].sort((a,b)=>a-b)));
    }

    function updateOutput() {
      const arr = [...facingRight].sort((a, b) => a - b);
      countEl.textContent = arr.length;
      output.value = `// 오른쪽을 바라보는 포켓몬 ID (scaleX(-1) 적용 대상)\nexport const FACE_RIGHT = new Set([\n  ${arr.join(', ')}\n]);`;
    }

    function copyOutput() {
      navigator.clipboard.writeText(output.value)
        .then(() => alert('복사됐습니다!'))
        .catch(() => { output.select(); document.execCommand('copy'); });
    }
  </script>
</body>
</html>
